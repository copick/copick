name: docs

on:
  push:
    branches:
      - main

# This job installs dependencies, builds the book, and pushes it to
# the `gh-pages` branch of the same repository.
jobs:
  deploy-book:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        with:
          version: "0.7.19"
          python-version: "3.13"
          activate-environment: true

      - name: Install copick
        run: uv sync --locked --extra docs

      # The unified CLI reference documents plugin commands (convert/process/logical/
      # training/inference/download) contributed by these packages, so they must be
      # importable for `make_cli_docs` to introspect them. Installed separately from the
      # locked sync to keep the (heavy, torch-pulling) plugins out of the docs lockfile.
      # Uses the CPU torch wheel to keep the CI install light. These must be released with
      # the normalized command docstrings for the rendered docs to be up to date.
      - name: Install plugin packages for CLI introspection
        env:
          UV_TORCH_BACKEND: cpu
        run: uv pip install copick-utils copick-torch copick-mcp

      # Regenerate the per-command CLI reference pages and the CLI-Reference nav node
      # from the live --help/docstrings before building.
      - name: Generate CLI reference
        run: make_cli_docs

      # Build the book
      - name: Build the book
        run: |
          zensical build

      # Push the site to github-pages
      - name: GitHub Pages action
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_dir: ./site
          github_token: ${{ secrets.GITHUB_TOKEN }}
